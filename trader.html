<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>M400 Terminal</title>
    <!-- 1. 確保網路通暢，載入這兩個核心引擎 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        /* 防止 Vue 載入前的閃爍或空白 */
        [v-cloak] { display: none !important; }
        body { background-color: #020617; color: white; margin: 0; }
        .loading-screen { 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; font-family: sans-serif; color: #64748b;
        }
    </style>
</head>
<body>

<div id="app" v-cloak>
    <!-- Header -->
    <nav class="border-b border-slate-800 p-4 sticky top-0 bg-[#020617]/80 backdrop-blur-md z-50">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <h1 class="font-bold tracking-tighter text-white">M400 TERMINAL</h1>
            <button @click="isModalOpen = true" class="text-emerald-400 bg-emerald-400/10 px-3 py-1 rounded-lg">+</button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-md mx-auto p-6 space-y-6">
        <!-- Goal Card -->
        <div class="bg-slate-900 border border-slate-800 p-6 rounded-3xl shadow-xl">
            <p class="text-xs text-slate-500 uppercase tracking-widest mb-2">Monthly Profit</p>
            <div class="text-4xl font-mono font-bold mb-4">${{ realizedProfit.toFixed(2) }}</div>
            <div class="w-full bg-slate-800 h-1.5 rounded-full overflow-hidden">
                <div class="bg-emerald-500 h-full transition-all duration-1000" :style="{ width: (realizedProfit/400*100) + '%' }"></div>
            </div>
        </div>

        <!-- List -->
        <div class="space-y-3">
            <div v-for="trade in trades" :key="trade.id" class="bg-slate-900/50 border border-slate-800 p-4 rounded-2xl flex justify-between">
                <div>
                    <div class="font-bold">{{ trade.ticker }}</div>
                    <div class="text-xs text-slate-500">{{ trade.qty }} Shares</div>
                </div>
                <div :class="trade.pnl >= 0 ? 'text-emerald-400' : 'text-rose-500'" class="font-mono font-bold">
                    ${{ trade.pnl }}
                </div>
            </div>
        </div>
    </main>

    <!-- New Entry Modal -->
    <div v-if="isModalOpen" class="fixed inset-0 bg-black/90 flex items-center justify-center p-6 z-[100]">
        <div class="bg-slate-900 border border-slate-800 p-6 rounded-3xl w-full max-w-sm">
            <h2 class="text-white font-bold mb-4">NEW TRADE</h2>
            <input v-model="form.ticker" placeholder="TICKER" class="w-full bg-black border border-slate-800 p-3 mb-3 rounded-xl text-white">
            <input v-model.number="form.pnl" type="number" placeholder="PNL ($)" class="w-full bg-black border border-slate-800 p-3 mb-3 rounded-xl text-white">
            <div class="flex gap-2">
                <button @click="isModalOpen = false" class="flex-1 text-slate-500 py-3">CANCEL</button>
                <button @click="saveTrade" class="flex-1 bg-emerald-600 text-white rounded-xl py-3">SAVE</button>
            </div>
        </div>
    </div>
</div>

<!-- 如果 Vue 沒跑起來，會顯示這個 -->
<div id="fallback" class="loading-screen">
    Initializing Terminal...
</div>

<script>
    // 檢查 Vue 是否成功載入
    window.onload = function() {
        if (typeof Vue === 'undefined') {
            document.getElementById('fallback').innerHTML = "Error: Please check your internet connection.";
            return;
        }
        document.getElementById('fallback').style.display = 'none';

        const { createApp, ref, computed, onMounted } = Vue;
        createApp({
            setup() {
                const trades = ref([]);
                const isModalOpen = ref(false);
                const form = ref({ ticker: '', pnl: 0, qty: 1 });

                onMounted(() => {
                    const saved = localStorage.getItem('m400_data');
                    if (saved) trades.value = JSON.parse(saved);
                });

                const realizedProfit = computed(() => {
                    return trades.value.reduce((sum, t) => sum + t.pnl, 0);
                });

                const saveTrade = () => {
                    if(!form.value.ticker) return;
                    trades.value.push({ ...form.value, id: Date.now() });
                    localStorage.setItem('m400_data', JSON.stringify(trades.value));
                    isModalOpen.value = false;
                    form.value = { ticker: '', pnl: 0, qty: 1 };
                };

                return { trades, isModalOpen, form, realizedProfit, saveTrade };
            }
        }).mount('#app');
    };
</script>
</body>
</html>
